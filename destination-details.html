<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelNest</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="shortcut icon" href="Images/favicon/Travelnest_favicon.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
</head>
<body>
    
    <header>
        <nav class="nav-bar">
            <a href="#" class="logo">Travel<span class="head">Nest</span><img src="Images/vecteezy_simple-airplane-decal_18127308.png" alt=""></a>
>       </nav>
    </header>

    <main class="destination-details-main">
        
            <div class="image-overlay">
               <div class="destination-details-image">
    
                   <img id="details_image" src="/Images/error.png" alt="Destination Image">
                </div>
            </div>
            <div class="destination-details-container">
              <div class="destination-details-info">
                <h1 id="details_location">loading..</h1>
                <h2 id="details_country">loading..</h2>
                <p id="details_description"></p>
                <h2 id = "Attractions">Attractions</h2>
                <ul id="details_attractions">
                    
                </ul>
                <h2 id="travel-costs">Travel Costs</h2>
                <table class="detail-table">
                        <thead>
                            <tr>
                                <th>Category</th>
                                <th> Budget</th>
                                <th> Mid-range</th>
                                <th> Luxury</th>
                            </tr>
                        </thead>
                        <tbody id="detail-costs">
                            
                        </tbody>
                    </table>
               </div>
            </div>

    </main>
     <div class="bar-section"></div>
    <div class="copy-rights">
       <p>© 2026 TravelNest.All Rights Reserved.</p>
    </div>
    

    <script src="Javascript/destination-details.js"></script>
    <script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
    });
}
</script>
</body>
</html>
